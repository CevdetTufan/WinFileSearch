name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'src/WinFileSearch.UI/WinFileSearch.UI.csproj'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $env:GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true

    - name: Publish Self-Contained (x64)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish/win-x64 `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Publish Framework-Dependent (x64)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime win-x64 `
          --self-contained false `
          --output ./publish/win-x64-fd `
          -p:PublishSingleFile=true `
          -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Create ZIP archives
      run: |
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./WinFileSearch-v${{ steps.version.outputs.VERSION }}-win-x64-selfcontained.zip
        Compress-Archive -Path ./publish/win-x64-fd/* -DestinationPath ./WinFileSearch-v${{ steps.version.outputs.VERSION }}-win-x64.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: WinFileSearch v${{ steps.version.outputs.VERSION }}
        body: |
          ## WinFileSearch v${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          - **Self-Contained (Recommended)**: No .NET runtime required (~65MB)
          - **Framework-Dependent**: Requires .NET 8 runtime (~15MB)
          
          ### What's New
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details.
          
          ---
          ⚠️ **Beta Version**: This is a pre-release version. Please report any issues.
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        files: |
          ./WinFileSearch-v${{ steps.version.outputs.VERSION }}-win-x64-selfcontained.zip
          ./WinFileSearch-v${{ steps.version.outputs.VERSION }}-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Get version
      id: version
      shell: pwsh
      run: |
        $ver = "${{ github.ref_name }}".TrimStart('v')
        "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Build
      run: |
        dotnet restore
        dotnet build --configuration Release

    - name: Publish
      run: |
        dotnet publish src/WinFileSearch.UI/WinFileSearch.UI.csproj -c Release -r win-x64 --self-contained true -o ./publish/win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

    - name: Create ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath "./WinFileSearch-${{ github.ref_name }}-portable.zip"

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build Installer
      shell: pwsh
      run: |
        $content = Get-Content "installer/WinFileSearch.iss" -Raw
        $content = $content -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
        $content | Set-Content "installer/WinFileSearch.iss"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer/WinFileSearch.iss"
        Get-ChildItem installer/*.exe | Rename-Item -NewName "WinFileSearch-${{ github.ref_name }}-setup.exe"

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./WinFileSearch-${{ github.ref_name }}-portable.zip
          ./installer/WinFileSearch-${{ github.ref_name }}-setup.exe
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

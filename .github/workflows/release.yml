name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build and Publish
      run: |
        dotnet restore
        dotnet publish src/WinFileSearch.UI/WinFileSearch.UI.csproj -c Release -r win-x64 --self-contained true -o ./publish/win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true

    - name: Create Portable ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath "./WinFileSearch-${{ github.ref_name }}-portable.zip"

    - name: Install Inno Setup
      run: choco install innosetup -y

    - name: Build Installer
      shell: pwsh
      working-directory: installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "WinFileSearch.iss"

    - name: List Files
      shell: pwsh
      run: |
        Get-ChildItem -Recurse *.exe, *.zip | Select-Object FullName

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: WinFileSearch ${{ github.ref_name }}
        body: |
          ## WinFileSearch ${{ github.ref_name }}
          
          ### İndirme Seçenekleri
          - **Setup EXE**: Kurulum sihirbazı ile kolay yükleme
          - **Portable ZIP**: Kurulum gerektirmez, çıkar ve çalıştır
        files: |
          ./WinFileSearch-*.zip
          ./WinFileSearch-Setup-*.exe
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
